# Base Manifest Configuration
# Global metadata and shared configuration for all 7 AI coding tools
# This file is merged with tool-specific configs to produce manifest.json

manifest_version: "1.7.1"
environment: "production"
description: "AI Engineering Harness - Modular manifest for 7 AI coding tools"

# Global defaults applied to all tools
global_defaults:
  strict_paths: true
  checksum_verification: true
  validate_on_install: true

# Tool ordering (for consistent output)
tool_order:
  - "claude"
  - "opencode"
  - "gemini"
  - "pi"
  - "wocode"
  - "codex"
  - "antigravity"

# Shared asset templates (YAML anchors for reuse)
shared_templates:
  investor_ready_doc_gen_assets: &investor_ready_doc_gen_assets
