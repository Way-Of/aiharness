# config-manifest-example.yaml
# Example per-tool YAML entry showing how to register a skill for all 7 tools.
# Copy this block into each tool's YAML at config-manifest/tools/<tool>.yaml.
#
# Tool-specific notes:
# - opencode: src uses kebab-case dir naming
# - claude:   src uses snake_case dir naming
# - gemini:   src uses snake_case dir naming
# - pi:       src uses kebab-case dir naming under pi/agent/
# - wocode:   src uses kebab-case dir naming under wocode/agent/
# - codex:    src uses snake_case dir naming
# - antigravity: src uses snake_case dir naming
#
# dest paths are always kebab-case (canonical format).

# --- opencode ---
#   skill/example-skill:
#     description: Description of the skill
#     files:
#     - src: opencode/skills/example-skill/SKILL.md
#       dest: skills/example-skill/SKILL.md
#     - src: opencode/skills/example-skill/assets/template.md
#       dest: skills/example-skill/assets/template.md

